apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: no-hostports
  annotations:
    policies.kyverno.io/title: No Host Ports
    policies.kyverno.io/category: CIS
    policies.kyverno.io/description: >-
      Containers must not use hostPort, which binds directly to the node network
      and bypasses network policy. Satisfies CIS Kubernetes Benchmark 5.2.13.
spec:
  validationFailureAction: Enforce
  rules:
    - name: no-hostports
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
      validate:
        message: "Use of hostPort is not allowed."
        pattern:
          spec:
            =(initContainers):
              - =(ports):
                  - X(hostPort): null
            containers:
              - =(ports):
                  - X(hostPort): null
