apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: default-deny-networkpolicy
  annotations:
    policies.kyverno.io/title: Default Deny NetworkPolicy
    policies.kyverno.io/category: CIS
    policies.kyverno.io/description: >-
      Generates a default-deny NetworkPolicy in every new namespace to ensure
      all traffic is explicitly allowed. Satisfies CIS Kubernetes Benchmark 5.3.2.
spec:
  rules:
    - name: default-deny
      match:
        any:
          - resources:
              kinds: [Namespace]
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
                - cert-manager
                - monitoring
                - kyverno
      generate:
        generateExisting: true
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: default-deny-all
        namespace: "{{ request.object.metadata.name }}"
        synchronize: true
        data:
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress
            ingress:
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: kube-system
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: monitoring
            egress:
              - ports:
                  - port: 53
                    protocol: UDP
                  - port: 53
                    protocol: TCP
