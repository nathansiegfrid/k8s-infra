apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-default-namespace
  annotations:
    policies.kyverno.io/title: Restrict Default Namespace
    policies.kyverno.io/category: CIS
    policies.kyverno.io/description: >-
      Workloads must not be deployed into the default namespace. Satisfies CIS
      Kubernetes Benchmark 5.6.4.
spec:
  validationFailureAction: Enforce
  rules:
    - name: restrict-default-namespace
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      validate:
        message: "Using the default namespace is not allowed. Create a dedicated namespace for your workload."
        pattern:
          metadata:
            namespace: "?*"
          (metadata.namespace != 'default'): true
