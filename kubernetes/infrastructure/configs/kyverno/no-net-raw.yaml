apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: no-net-raw
  annotations:
    policies.kyverno.io/title: No NET_RAW Capability
    policies.kyverno.io/category: CIS
    policies.kyverno.io/description: >-
      Containers must not add the NET_RAW capability, which allows crafting raw
      packets and is a common privilege escalation vector. Satisfies CIS 5.2.8.
spec:
  validationFailureAction: Enforce
  rules:
    - name: no-net-raw
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - flux-system
      validate:
        message: "Adding the NET_RAW capability is not allowed."
        pattern:
          spec:
            =(ephemeralContainers):
              - =(securityContext):
                  =(capabilities):
                    =(add):
                      - "!NET_RAW"
            =(initContainers):
              - =(securityContext):
                  =(capabilities):
                    =(add):
                      - "!NET_RAW"
            =(containers):
              - =(securityContext):
                  =(capabilities):
                    =(add):
                      - "!NET_RAW"
