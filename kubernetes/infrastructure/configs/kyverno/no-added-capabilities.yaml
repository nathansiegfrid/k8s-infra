apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: no-added-capabilities
  annotations:
    policies.kyverno.io/title: No Added Capabilities
    policies.kyverno.io/category: CIS
    policies.kyverno.io/description: >-
      Containers must not add any Linux capabilities beyond the default set.
      Satisfies CIS Kubernetes Benchmark 5.2.10.
spec:
  validationFailureAction: Enforce
  rules:
    - name: no-added-capabilities
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
      validate:
        message: "Adding capabilities is not allowed. Remove securityContext.capabilities.add."
        pattern:
          spec:
            =(initContainers):
              - =(securityContext):
                  =(capabilities):
                    X(add): null
            containers:
              - =(securityContext):
                  =(capabilities):
                    X(add): null
