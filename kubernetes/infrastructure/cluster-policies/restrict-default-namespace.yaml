apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-default-namespace
  annotations:
    policies.kyverno.io/title: Restrict Default Namespace
    policies.kyverno.io/category: CIS
    policies.kyverno.io/description: >-
      CIS Kubernetes benchmark 5.6.4: The default namespace shouldn't be used.
spec:
  validationFailureAction: Enforce
  rules:
    - name: restrict-default-namespace
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - Service
                - Ingress
                - ConfigMap
                - Secret
                - PersistentVolumeClaim
                - ServiceAccount
      exclude:
        any:
          - resources:
              namespaces: [default]
              kinds: [Service]
              names: [kubernetes]
          - resources:
              namespaces: [default]
              kinds: [ConfigMap]
              names: [kube-root-ca.crt]
          - resources:
              namespaces: [default]
              kinds: [ServiceAccount]
              names: [default]
      validate:
        message: "Using the default namespace is not allowed. Create a dedicated namespace for your workload."
        deny:
          conditions:
            any:
              - key: "{{ request.object.metadata.namespace || '' }}"
                operator: Equals
                value: default
