apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: controllers
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/infrastructure/monitoring
  prune: true
  wait: true
