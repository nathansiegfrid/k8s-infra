apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ingress
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/infrastructure/ingress
  prune: true
  wait: true
  dependsOn:
    - name: cert-manager
    - name: envoy-gateway
    - name: sealed-secrets
