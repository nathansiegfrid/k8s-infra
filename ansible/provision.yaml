---
- name: Provision Hostinger server
  hosts: all
  become: true
  vars_files:
    - vars.yaml
  vars:
    ansible_user: root

  tasks:
    - name: Update and upgrade apt packages
      apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    - name: Configure users and SSH
      import_role:
        name: users

    # fail2ban

    - name: Install fail2ban dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-systemd
          - fail2ban
        state: present

    - name: Write fail2ban jail config
      copy:
        dest: /etc/fail2ban/jail.d/cloud-config.local
        content: |
          [sshd]
          enabled = true
          backend = systemd
          banaction = iptables-multiport
        owner: root
        group: root
        mode: "0644"
      notify: Restart fail2ban

    - name: Enable and start fail2ban
      systemd:
        name: fail2ban
        enabled: true
        state: started

    # RKE2

    - name: Install RKE2
      shell: curl -sfL https://get.rke2.io | sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Copy RKE2 config files
      copy:
        src: files/rke2/
        dest: /etc/rancher/rke2/
        owner: root
        group: root
        mode: "0600"

    - name: Copy kubelet config
      copy:
        src: files/kubelet/
        dest: /etc/rancher/rke2/agent/etc/kubelet.conf.d/
        owner: root
        group: root
        mode: "0600"

    - name: Create etcd system user
      user:
        name: etcd
        shell: /sbin/nologin
        create_home: false
        system: true
        state: present

    - name: Copy CIS sysctl config
      copy:
        remote_src: true
        src: /usr/local/share/rke2/rke2-cis-sysctl.conf
        dest: /etc/sysctl.d/60-rke2-cis.conf
        owner: root
        group: root
        mode: "0644"

    - name: Restart systemd-sysctl
      systemd:
        name: systemd-sysctl
        state: restarted

    - name: Enable and start rke2-server
      systemd:
        name: rke2-server
        enabled: true
        state: started

    - name: Wait for RKE2 to be ready
      command: /var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml get nodes
      register: rke2_ready
      retries: 10
      delay: 5
      until: rke2_ready.rc == 0
      changed_when: false

    - name: Configure kubectl for all users
      copy:
        dest: /etc/profile.d/rke2.sh
        content: |
          export PATH=$PATH:/var/lib/rancher/rke2/bin
          export KUBECONFIG=/etc/rancher/rke2/rke2.yaml
        owner: root
        group: root
        mode: "0644"

  handlers:
    - name: Restart fail2ban
      systemd:
        name: fail2ban
        state: restarted
